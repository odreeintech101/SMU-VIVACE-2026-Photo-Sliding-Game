<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="8"/>
  <circle cx="100" cy="100" r="87" fill="#1e2854"/>
  
  <!-- Pink/Magenta V -->
  <g transform="translate(100, 100)">
    <!-- Left stroke of V -->
    <path d="M -35 -40 L 0 50" stroke="#FF1493" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- Right stroke of V -->
    <path d="M 35 -40 L 0 50" stroke="#FF1493" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- White highlight on left -->
    <path d="M -32 -35 L 3 45" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- White highlight on right -->
    <path d="M 32 -35 L -3 45" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>
</svg>